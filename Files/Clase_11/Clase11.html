# Maximización del beneficio

--

En un mercado de **Monopolio**:

--

+ Una empresa decide la producción `\(Q=q\)`.

--

+ Un cambio en `\(q\)` afecta los precios de mercado, es medido por la *función inversa* de la .black[demanda] `\(P(q)\)`.

--

+ Un ejemplo de *función inversa* es:

--

`$$p=a-bq, \quad \text{donde}\;a,b&gt;0$$`
--

+ Cuando un **monopolista** vende pocas unidades del bien que provee en el mercado, los consumidores están dispuestos a pagar un mayor precio por ese bien escaso.

--

+ Cuando la firma ofrece mayores unidades (grandes valores de `\(q\)`), los consumidores están dispuestos a pagar un menor valor por ese bien abundante.


---
# Maximización del beneficio

--

La condición de un **monopolista** es distinto a un mercado competitivo. Su beneficio radicado en:

--

`$$\pi= p \times q - CT(q)$$`

--

Debe ser diferenciada (usar derivada) para lograr su mayor y mas alto punto de beneficio.

--

.RUred[Ingreso marginal] no es mas que su ingreso adicional obtenido al producir un nivel mayor de producto.

--

.RUred[Costo marginal] Es el costo adicional que incurre el monopolista si decide aumentar en un nivel superior su producto.

--

.black[Condición de equilibrio] 

--

`$$Img=Cmg$$`
--

+ Si el `\(Img&gt;Cmg\)` el **Monopolista** tendra incentivos a producir mas, porque percibirá un ingreso mucho mayor.

--

+ Si por el contrario `\(Img&lt;Cmg\)` el **Monopolista** reducira su producción lo que considere pertinente para operar en ese mercado.

---
# Maximización del beneficio

--

<svg aria-hidden="true" role="img" viewBox="0 0 512 512" style="height:1em;width:1em;vertical-align:-0.125em;margin-left:auto;margin-right:auto;font-size:inherit;fill:blue;overflow:visible;position:relative;"><path d="M470.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 256 265.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160zm-352 160l160-160c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L210.7 256 73.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0z"/></svg> Cuando el **Monopolista** desea incrementar la producción puede tener dos efectos:

--

1. Efecto **positivo**, al vender una unidad mas gana la relación `\(p(q)\)`, y desde luego su ganancia se incrementa.

--

2. Efecto .RUred[negativo], cuando .black[ofrece] una unidad mas la firma necesariamente necesita disminuir los precios. Esto es: `\(\frac{\partial p(q)}{\partial q}&lt;0\)`

--

En resumen, el efecto total del **monopolista** finalmente tiene que ver con el comportamiento de sus costos y de la relación `\(Img=Cmg\)`.

# Maximización del beneficio

--

.blue[*Ejemplo 1*]: Considere que `\(p(q)=10-3q\)`. Si la empresa requiere incrementar su producto, entonces:

--

`$$\begin{aligned}
Img=&amp; p(q) + \frac{\partial p(q)}{\partial q}q\\
=&amp; (10-3q)+ (-3)q\\
=&amp; 10-6q
\end{aligned}$$`

--

Si la firma vende dos unidades,

--

`$$\pi= (10-3 \times 2)2= 8$$`
--

Ahora evaluemos su `\(Img(q)=2\)` con las unidades obtenidas.

--

`$$(10-3 \times 2)+ (-3)2= 4-6= -2 \; \text{moneda local}$$`

--

El efecto **positivo** es solo ganarse 4, porque ahora vende una unidad adicional. Pero de lo .RUred[negativo] al vender una unidad adicional tiene que hacerlo reduciendo su beneficio en 2 unidades monetarias.

# Maximización del beneficio

--

Regularmente el **monopolista** siempre intenta tomarse el maximo del beneficio de todo el mercado.

--

.blue[*Ejemplo 2*]: Suponga que el .black[Costo Total] de un mercado es de `\(CT(q)=2q\)`. Qué precio -con una demanda lineal de `\(p(q)=10-3q\)` - cobra un monopolista?. Cuanto cobra una empresa, si se tratara de un mercado competitivo?

--

+ La regla para la primera parte es `\(Img=Cmg\)`

--

`$$\begin{aligned}
Img=&amp; Cmg\\
10-6q=&amp; 2\\
10-2=&amp; 6q\\
\frac{8}{6}=&amp;1.34
\end{aligned}$$`

--

Por ende el monopolista cobrará `\(P=6\)`, *esto se obtiene reemplazando las unidades en la demanda original del mercado*. 

---
# Maximización del beneficio

--

+ Miremos el mercado competitivo

--

`$$\begin{aligned}
P=&amp; Cmg\\
10-3q=&amp; 2\\
10-2=&amp; 3q\\
\frac{8}{3}=&amp;2.66
\end{aligned}$$`
--

El mercado competitivo cobra un precio de `\(P=2\)`. Note que produce mas unidades pero debe hacerlo con un precio inferior.

### Limitan la elección de los consumidores

Los monopolistas tienen pocos incentivos para competir por los clientes.

- **Resultado:** Menos líneas de productos .mono[+] menor calidad.

- **Ejemplo:** empresas de cable y servicios combinados.

--

### Buscadores de renta

Los monopolistas pueden utilizar los procesos políticos para impedir la competencia o asegurarse nuevos monopolios.

- Una forma de competencia, pero no de la buena.

- **Ejemplo:** Presionar al Congreso para que proteja el comercio.

---
# Monopsonio

--

&gt; Cuando solo hay uno o unos pocos compradores, algunos pueden tener poder de monopsonio: tienen capacidad para **influir en el precio** del bien. El poder de monopsonio permite al comprador adquirir el bien a un precio inferior al que estaría vigente en un mercado competitivo.

--

Razón:

--

`$$P_{monopsonio}&lt;P_{competencia}$$`
--

### Palabras claves!!

--

.RUred[Valor Marginal] Beneficio adicional generado por la compra de una unidad más de un *bien*.

--

.RUred[curva de valor marginal] de una persona es su curva de demanda del bien. la curva de oferta es la **curva de gasto medio**.

---
# Monopsonio

--

El coste adicional de comprar una unidad más de un bien se denomina .RUred[gasto marginal].

El .RUred[gasto medio] viene a ser el Precio pagado por unidad de un bien.

--

`$$P \times q = \text{Gasto Medio}$$`
---
# Monopsonio

--

### Elasticidad de la oferta del mercado 

Un .RUred[monopsonista] se beneficia porque se enfrenta a una **curva de oferta** de pendiente positiva, por lo que el gasto marginal es superior al gasto medio. Cuanto menos elástica es la curva de oferta, mayor es la diferencia entre el gasto marginal y el gasto medio y más poder de monopsonio tiene el comprador.

--

###Número de compradores

En la mayoría de los mercados, hay más de un comprador y el número de **compradores** es un importante determinante del poder de monopsonio. Cuando el número de compradores es muy grande, ninguno de ellos puede influir significativamente en el precio.

--

### Relación entre los compradores

Finalmente, supongamos que hay tres o cuatro compradores en el mercado. Si estos compiten ferozmente, presionan al alza sobre el precio hasta que este es cercano al **valor marginal** de su producto y, por tanto, tienen poco poder de monopsonio. En cambio, si compiten menos o llegan incluso a coludir, los precios no suben mucho y su grado de poder de monopsonio puede ser tan grande como si solo hubiera un comprador.
